name: Instagram Stories Tracker

on:
  schedule:
    # Run every 15 minutes, offset so it does not run at :00 or :30 (UTC)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write

jobs:
  tracker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/requirements-instagram.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-instagram.txt
        playwright install --with-deps
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Run Instagram Stories Tracker
      env:
        INSTAGRAM_STORIES_DISCORD_WEBHOOK: ${{ secrets.INSTAGRAM_STORIES_DISCORD_WEBHOOK }}
      run: |
        python scripts/instagram_stories_tracker.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/instagram_stories_history.json data/instagram_stories_analytics.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Instagram Stories data"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
